<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islanda Animada</title>
<style>
:root {
  --primary: #8B5CF6;
  --primary-dark: #6D28D9;
  --pink: #EC4899;
  --accent: #F59E0B;
  --bg: #1F1B2E;
  --bg-light: #2D2640;
  --text: #F3F0FF;
  --text-muted: #A78BFA;
  --frame-light: #D4A945;
  --frame-mid: #8B6914;
  --frame-dark: #5C4610;
  --canvas-bg: #FAF7F0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #1a1025 0%, var(--bg) 40%, #2a1f3d 100%);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}
.hidden { display: none !important; }

#toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-light); border: 1px solid var(--primary);
  border-radius: 12px; padding: 12px 20px; color: var(--text);
  font-size: 14px; box-shadow: 0 4px 20px rgba(139,92,246,0.3);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

header {
  text-align: center; padding: 30px 20px 10px;
}
header h1 {
  font-size: clamp(2rem, 5vw, 3rem);
  background: linear-gradient(135deg, var(--primary), var(--pink), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p {
  color: var(--text-muted); font-size: 1.1rem; margin-top: 6px; font-style: italic;
}

.counter {
  text-align: center; margin: 10px 0; color: var(--accent); font-size: 0.95rem;
}

.easel-container {
  display: flex; flex-direction: column; align-items: center;
  margin: 20px auto; max-width: 600px; padding: 0 20px;
}
.frame {
  position: relative;
  border: 16px solid;
  border-image: linear-gradient(145deg, var(--frame-light), var(--frame-mid), var(--frame-dark), var(--frame-mid), var(--frame-light)) 1;
  box-shadow: 0 0 30px rgba(212,169,69,0.3), inset 0 0 20px rgba(0,0,0,0.2);
  background: var(--canvas-bg);
  width: 100%; max-width: 500px; aspect-ratio: 4/3;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.frame-legs {
  display: flex; justify-content: center; gap: 60%;
}
.frame-legs::before, .frame-legs::after {
  content: ''; display: block; width: 8px; height: 60px;
  background: linear-gradient(180deg, var(--frame-dark), #3d2e0a);
  transform: perspective(100px) rotateX(-5deg);
  border-radius: 0 0 4px 4px;
}
.frame-legs::after { content: ''; }

#upload-zone {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: background 0.3s;
}
#upload-zone:hover { background: rgba(139,92,246,0.05); }
#upload-zone .icon { font-size: 3rem; margin-bottom: 10px; }
#upload-zone p { color: var(--frame-mid); font-size: 0.95rem; }
#upload-zone.dragover { background: rgba(139,92,246,0.1); }

#preview-img {
  width: 100%; height: 100%; object-fit: contain; display: block;
}
#preview-video {
  width: 100%; height: 100%; object-fit: contain; display: block;
}

.controls {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 12px; margin: 20px auto; max-width: 600px; padding: 0 20px;
}
.btn {
  border: none; border-radius: 50px; padding: 14px 28px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  color: white;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-main {
  background: linear-gradient(135deg, var(--primary), var(--pink));
  box-shadow: 0 4px 20px rgba(139,92,246,0.4);
  position: relative; overflow: hidden;
}
.btn-main::after {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  animation: shimmer 3s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

.btn-effects {
  background: linear-gradient(135deg, var(--primary-dark), #4c1d95);
  box-shadow: 0 4px 15px rgba(109,40,217,0.3);
}
.btn-small {
  background: var(--bg-light); border: 1px solid var(--primary);
  padding: 10px 20px; font-size: 0.85rem; color: var(--text-muted);
}
.btn-small:hover { border-color: var(--pink); color: var(--text); }

.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.progress-container {
  width: 100%; max-width: 500px; margin: 10px auto;
  padding: 0 20px;
}
.progress-bar {
  height: 6px; background: var(--bg-light); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%; border-radius: 3px;
  background: linear-gradient(90deg, var(--primary), var(--pink), var(--accent));
  transition: width 0.1s;
}

.effects-panel {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 10px; margin: 10px auto; max-width: 600px; padding: 0 20px;
}
.btn-effect {
  background: var(--bg-light); border: 1px solid var(--text-muted);
  border-radius: 50px; padding: 8px 18px; font-size: 0.85rem;
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
}
.btn-effect:hover, .btn-effect.active {
  border-color: var(--accent); color: var(--accent);
  box-shadow: 0 0 12px rgba(245,158,11,0.3);
}

.gallery-section {
  max-width: 700px; margin: 30px auto; padding: 0 20px;
}
.gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 12px 0; border-top: 1px solid var(--bg-light);
}
.gallery-header h3 { color: var(--text-muted); font-size: 1rem; }
.gallery-header span { color: var(--text-muted); font-size: 1.2rem; transition: transform 0.3s; }
.gallery-header.open span { transform: rotate(180deg); }
.gallery-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px; padding: 10px 0;
}
.gallery-item {
  position: relative; border-radius: 8px; overflow: hidden;
  aspect-ratio: 4/3; cursor: pointer; border: 2px solid var(--bg-light);
  transition: border-color 0.2s;
}
.gallery-item:hover { border-color: var(--primary); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; }
.gallery-item .delete-btn {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(220,38,38,0.9); color: white;
  border: none; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.gallery-item:hover .delete-btn { opacity: 1; }

footer {
  text-align: center; padding: 30px 20px; color: var(--text-muted);
  font-size: 0.9rem;
}

@media (max-width: 500px) {
  .frame { max-width: 95vw; }
  .btn { padding: 12px 20px; font-size: 0.9rem; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<script>
(function() {
  "use strict";

  // ===== STATE =====
  let uploadedImage = null;
  let animationCount = parseInt(localStorage.getItem('isla_count') || '0');
  let gallery = JSON.parse(localStorage.getItem('isla_gallery') || '[]');
  let activeEffect = null;
  let effectRAF = null;
  let audioCtx = null;
  let audioNodes = null;
  let isRecording = false;
  let videoBlobURL = null;

  // ===== BUILD DOM =====
  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <h1>\u{1F3A8} Islanda Animada \u2728</h1>
      <p>Dando vida as suas obras de arte</p>
    </header>
    <div class="counter" id="counter">\u2728 Anima\u00E7\u00F5es: ${animationCount}</div>
    <div class="easel-container">
      <div class="frame" id="frame">
        <div id="upload-zone">
          <div class="icon">\u{1F5BC}\uFE0F</div>
          <p>Arraste sua obra ou clique aqui</p>
        </div>
        <img id="preview-img" class="hidden" alt="Preview">
        <video id="preview-video" class="hidden" loop muted playsinline></video>
        <canvas id="effect-canvas" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
      </div>
      <div class="frame-legs"></div>
    </div>
    <div class="progress-container hidden" id="progress-container">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="controls" id="controls">
      <button class="btn btn-main" id="btn-dar-vida" disabled>\u{1F31F} Dar Vida</button>
      <button class="btn btn-effects" id="btn-efeitos" disabled>\u{1F3AD} Efeitos</button>
      <button class="btn btn-small hidden" id="btn-nova">\u{1F5BC}\uFE0F Nova Imagem</button>
    </div>
    <div class="effects-panel hidden" id="effects-panel">
      <button class="btn-effect" data-effect="parallax">Parallax 2.5D</button>
      <button class="btn-effect" data-effect="ondas">Ondas</button>
      <button class="btn-effect" data-effect="portal">Portal</button>
      <button class="btn-effect" data-effect="cinematic">Cinematic</button>
    </div>
    <section class="gallery-section" id="gallery-section">
      <div class="gallery-header" id="gallery-header">
        <h3>\u{1F3AC} Galeria (${gallery.length})</h3>
        <span>\u25BC</span>
      </div>
      <div class="gallery-grid hidden" id="gallery-grid"></div>
    </section>
    <footer>Feito com \u{1F49C} para Islanda</footer>
  `;

  // ===== REFS =====
  const uploadZone = document.getElementById('upload-zone');
  const previewImg = document.getElementById('preview-img');
  const previewVideo = document.getElementById('preview-video');
  const effectCanvas = document.getElementById('effect-canvas');
  const frame = document.getElementById('frame');
  const btnDarVida = document.getElementById('btn-dar-vida');
  const btnEfeitos = document.getElementById('btn-efeitos');
  const btnNova = document.getElementById('btn-nova');
  const effectsPanel = document.getElementById('effects-panel');
  const progressContainer = document.getElementById('progress-container');
  const progressFill = document.getElementById('progress-fill');
  const counterEl = document.getElementById('counter');
  const galleryHeader = document.getElementById('gallery-header');
  const galleryGrid = document.getElementById('gallery-grid');
  const gallerySection = document.getElementById('gallery-section');

  // ===== TOAST =====
  function toast(msg) {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 2500);
  }

  // ===== FILE INPUT =====
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'image/*';

  uploadZone.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  fileInput.addEventListener('change', (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); });

  // Drag and drop
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); uploadZone.classList.remove('dragover'); });
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    uploadZone.classList.remove('dragover');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  frame.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
  frame.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if(!file.type.startsWith('image/')) { toast('Por favor, selecione uma imagem'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        uploadedImage = img;
        previewImg.src = ev.target.result;
        showImage();
        toast('\u{1F3A8} Obra carregada!');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showImage() {
    uploadZone.classList.add('hidden');
    previewImg.classList.remove('hidden');
    previewVideo.classList.add('hidden');
    effectCanvas.classList.add('hidden');
    btnDarVida.disabled = false;
    btnEfeitos.disabled = false;
    btnNova.classList.remove('hidden');
    stopEffect();
  }

  // ===== NOVA IMAGEM =====
  btnNova.addEventListener('click', () => {
    uploadedImage = null;
    previewImg.classList.add('hidden');
    previewVideo.classList.add('hidden');
    effectCanvas.classList.add('hidden');
    uploadZone.classList.remove('hidden');
    btnDarVida.disabled = true;
    btnEfeitos.disabled = true;
    btnNova.classList.add('hidden');
    effectsPanel.classList.add('hidden');
    stopEffect();
    if(videoBlobURL) { URL.revokeObjectURL(videoBlobURL); videoBlobURL = null; }
  });

  // ===== AUDIO =====
  function startAudio() {
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const gain = audioCtx.createGain();
    gain.gain.value = 0.03;
    gain.connect(audioCtx.destination);

    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sine'; osc1.frequency.value = 180;
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine'; osc2.frequency.value = 270;

    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.3;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 10;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);
    lfoGain.connect(osc2.frequency);

    osc1.connect(gain); osc2.connect(gain);
    osc1.start(); osc2.start(); lfo.start();
    audioNodes = { gain, osc1, osc2, lfo };
  }

  function stopAudio() {
    if(!audioCtx) return;
    try { audioNodes.osc1.stop(); audioNodes.osc2.stop(); audioNodes.lfo.stop(); } catch(e){}
    audioCtx.close(); audioCtx = null; audioNodes = null;
  }

  // ===== DAR VIDA (Record Animation) =====
  btnDarVida.addEventListener('click', () => {
    if(!uploadedImage || isRecording) return;
    recordAnimation();
  });

  function recordAnimation() {
    isRecording = true;
    btnDarVida.disabled = true;
    progressContainer.classList.remove('hidden');
    progressFill.style.width = '0%';
    previewImg.classList.add('hidden');
    previewVideo.classList.add('hidden');
    effectCanvas.classList.add('hidden');
    stopEffect();
    startAudio();

    const W = 640, H = 480;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Particles
    const particles = [];
    for(let i=0; i<25; i++) {
      particles.push({
        x: Math.random()*W, y: H + Math.random()*50,
        speed: 0.5 + Math.random()*1.5,
        size: 2 + Math.random()*4,
        color: ['#D4A945','#8B5CF6','#EC4899'][Math.floor(Math.random()*3)],
        alpha: 0.3 + Math.random()*0.6,
        wobble: Math.random()*Math.PI*2
      });
    }

    const duration = 5000;
    const fps = 30;
    const stream = canvas.captureStream(fps);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    const chunks = [];
    recorder.ondataavailable = (e) => { if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop = () => {
      isRecording = false;
      stopAudio();
      const blob = new Blob(chunks, { type: 'video/webm' });
      videoBlobURL = URL.createObjectURL(blob);
      previewVideo.src = videoBlobURL;
      previewVideo.classList.remove('hidden');
      previewVideo.play();
      progressContainer.classList.add('hidden');
      btnDarVida.disabled = false;
      animationCount++;
      localStorage.setItem('isla_count', animationCount);
      counterEl.textContent = `\u2728 Anima\u00E7\u00F5es: ${animationCount}`;
      saveToGallery(canvas);
      toast('\u2728 Anima\u00E7\u00E3o criada!');
    };

    recorder.start();
    const startTime = performance.now();

    function renderFrame() {
      const elapsed = performance.now() - startTime;
      const t = Math.min(elapsed / duration, 1);
      progressFill.style.width = (t*100)+'%';

      ctx.clearRect(0, 0, W, H);
      ctx.save();

      // Ken Burns
      const zoom = 1.0 + t * 0.08;
      const panX = t * 10 - 5;
      const panY = t * 5 - 2.5;
      // Breathing
      const breath = 1 + Math.sin(elapsed*0.003)*0.005;
      const totalScale = zoom * breath;

      ctx.translate(W/2 + panX, H/2 + panY);
      ctx.scale(totalScale, totalScale);
      ctx.translate(-W/2, -H/2);

      // Draw image
      const imgAspect = uploadedImage.width / uploadedImage.height;
      const canAspect = W / H;
      let dw, dh, dx, dy;
      if(imgAspect > canAspect) { dh = H; dw = H*imgAspect; } else { dw = W; dh = W/imgAspect; }
      dx = (W - dw)/2; dy = (H - dh)/2;
      ctx.drawImage(uploadedImage, dx, dy, dw, dh);

      // Warm overlay
      const warmAlpha = 0.04 + Math.sin(elapsed*0.001)*0.02;
      ctx.fillStyle = `rgba(255,180,80,${warmAlpha})`;
      ctx.fillRect(0, 0, W, H);

      ctx.restore();

      // Atmospheric haze
      const hazeX = Math.sin(elapsed*0.0005)*30;
      ctx.fillStyle = `rgba(200,180,255,0.02)`;
      ctx.fillRect(hazeX, 0, W, H);

      // Vignette
      const vigAlpha = 0.5 + Math.sin(elapsed*0.002)*0.1;
      const vigGrad = ctx.createRadialGradient(W/2,H/2,W*0.3, W/2,H/2,W*0.75);
      vigGrad.addColorStop(0, 'transparent');
      vigGrad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, W, H);

      // Particles
      for(const p of particles) {
        p.y -= p.speed;
        p.x += Math.sin(elapsed*0.002 + p.wobble)*0.5;
        if(p.y < -10) { p.y = H+10; p.x = Math.random()*W; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha * (0.5 + Math.sin(elapsed*0.005+p.wobble)*0.5);
        ctx.fill();
        // Trail
        ctx.beginPath();
        ctx.arc(p.x, p.y+p.size*2, p.size*0.5, 0, Math.PI*2);
        ctx.globalAlpha = p.alpha*0.3;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Sparkle bursts
      const sparklePhase = (elapsed % 1000) / 1000;
      if(sparklePhase < 0.15) {
        const sx = (Math.sin(elapsed*0.0031)*0.3+0.5)*W;
        const sy = (Math.cos(elapsed*0.0023)*0.3+0.5)*H;
        const sAlpha = 1 - sparklePhase/0.15;
        ctx.save();
        ctx.translate(sx, sy);
        for(let i=0;i<4;i++) {
          ctx.rotate(Math.PI/4);
          ctx.fillStyle = `rgba(255,255,220,${sAlpha})`;
          ctx.fillRect(-1, -8*(1-sparklePhase), 2, 16*(1-sparklePhase));
        }
        ctx.restore();
      }

      if(t < 1) {
        requestAnimationFrame(renderFrame);
      } else {
        recorder.stop();
      }
    }
    requestAnimationFrame(renderFrame);
  }

  function saveToGallery(canvas) {
    const thumb = document.createElement('canvas');
    thumb.width = 160; thumb.height = 120;
    const tctx = thumb.getContext('2d');
    tctx.drawImage(canvas, 0, 0, 160, 120);
    const dataURL = thumb.toDataURL('image/jpeg', 0.7);
    gallery.push({ thumb: dataURL, date: Date.now() });
    try { localStorage.setItem('isla_gallery', JSON.stringify(gallery)); } catch(e){}
    renderGallery();
  }

  // ===== EFFECTS PANEL =====
  btnEfeitos.addEventListener('click', () => {
    effectsPanel.classList.toggle('hidden');
  });

  effectsPanel.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-effect]');
    if(!btn) return;
    const eff = btn.dataset.effect;
    document.querySelectorAll('.btn-effect').forEach(b => b.classList.remove('active'));
    if(activeEffect === eff) { stopEffect(); return; }
    btn.classList.add('active');
    startEffect(eff);
  });

  function startEffect(name) {
    stopEffect();
    activeEffect = name;
    if(!uploadedImage) return;
    startAudio();

    previewImg.classList.add('hidden');
    previewVideo.classList.add('hidden');
    effectCanvas.classList.remove('hidden');

    const rect = frame.getBoundingClientRect();
    effectCanvas.width = rect.width;
    effectCanvas.height = rect.height;
    const ctx = effectCanvas.getContext('2d');
    const W = effectCanvas.width, H = effectCanvas.height;
    let mouseX = 0.5, mouseY = 0.5;

    frame.addEventListener('mousemove', onMouse);
    frame.addEventListener('touchmove', onTouch);
    function onMouse(e) {
      const r = frame.getBoundingClientRect();
      mouseX = (e.clientX - r.left)/r.width;
      mouseY = (e.clientY - r.top)/r.height;
    }
    function onTouch(e) {
      const r = frame.getBoundingClientRect();
      mouseX = (e.touches[0].clientX - r.left)/r.width;
      mouseY = (e.touches[0].clientY - r.top)/r.height;
    }

    const imgAspect = uploadedImage.width/uploadedImage.height;
    const canAspect = W/H;
    let dw, dh, dx, dy;
    if(imgAspect > canAspect) { dh=H; dw=H*imgAspect; } else { dw=W; dh=W/imgAspect; }
    dx=(W-dw)/2; dy=(H-dh)/2;

    const particles = [];
    for(let i=0;i<20;i++) particles.push({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*3,a:Math.random()*Math.PI*2});

    const startT = performance.now();

    function loop() {
      const elapsed = performance.now() - startT;
      ctx.clearRect(0,0,W,H);

      if(name==='parallax') {
        // 3 layers with depth
        const ox = (mouseX-0.5)*20;
        const oy = (mouseY-0.5)*20;
        ctx.save();
        ctx.translate(ox*0.3, oy*0.3);
        ctx.drawImage(uploadedImage, dx-10, dy-10, dw+20, dh+20);
        ctx.restore();
        ctx.save();
        ctx.translate(ox*0.7, oy*0.7);
        ctx.globalAlpha=0.15;
        ctx.drawImage(uploadedImage, dx, dy, dw, dh);
        ctx.globalAlpha=1;
        ctx.restore();
        // vignette
        const vg = ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.7);
        vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.5)');
        ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
        // particles
        for(const p of particles) {
          p.x += Math.sin(p.a+elapsed*0.001)*0.5 + ox*0.05;
          p.y -= 0.3;
          if(p.y<0){p.y=H;p.x=Math.random()*W;}
          ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
          ctx.fillStyle=`rgba(212,169,69,${0.4+Math.sin(elapsed*0.003+p.a)*0.3})`;
          ctx.fill();
        }
      } else if(name==='ondas') {
        const sliceH = 4;
        for(let y=0;y<H;y+=sliceH) {
          const wave = Math.sin((y+elapsed*0.05)*0.03)*10;
          ctx.drawImage(uploadedImage, 0,y*uploadedImage.height/H, uploadedImage.width, sliceH*uploadedImage.height/H,
            dx+wave, dy+y*(dh/H), dw, sliceH*(dh/H));
        }
        // color shift
        ctx.globalCompositeOperation='overlay';
        ctx.fillStyle=`rgba(139,92,246,${0.05+Math.sin(elapsed*0.002)*0.03})`;
        ctx.fillRect(0,0,W,H);
        ctx.globalCompositeOperation='source-over';
      } else if(name==='portal') {
        ctx.drawImage(uploadedImage, dx, dy, dw, dh);
        // slight warp via scale pulse
        const warp = 1+Math.sin(elapsed*0.003)*0.01;
        ctx.save(); ctx.translate(W/2,H/2); ctx.scale(warp,warp); ctx.translate(-W/2,-H/2);
        ctx.globalAlpha=0.3; ctx.drawImage(uploadedImage, dx, dy, dw, dh);
        ctx.globalAlpha=1; ctx.restore();
        // vortex particles
        for(let i=0;i<30;i++) {
          const angle = (elapsed*0.001) + (i/30)*Math.PI*2;
          const radius = W*0.4 + Math.sin(elapsed*0.002+i)*20;
          const px = W/2 + Math.cos(angle)*radius;
          const py = H/2 + Math.sin(angle)*radius*0.7;
          ctx.beginPath(); ctx.arc(px,py,2+Math.sin(i)*1.5,0,Math.PI*2);
          ctx.fillStyle = i%2===0 ? `rgba(139,92,246,0.6)` : `rgba(236,72,153,0.6)`;
          ctx.fill();
        }
      } else if(name==='cinematic') {
        const cZoom = 1 + (elapsed%8000)/8000 * 0.1;
        const cPanX = Math.sin(elapsed*0.0003)*15;
        const cPanY = Math.cos(elapsed*0.0002)*10;
        ctx.save();
        ctx.translate(W/2+cPanX, H/2+cPanY);
        ctx.scale(cZoom, cZoom);
        ctx.translate(-W/2, -H/2);
        ctx.drawImage(uploadedImage, dx, dy, dw, dh);
        ctx.restore();
        // letterbox
        ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.fillRect(0,0,W,H*0.1);
        ctx.fillRect(0,H*0.9,W,H*0.1);
        // light leak
        const llAlpha = 0.05+Math.sin(elapsed*0.001)*0.04;
        const llGrad = ctx.createLinearGradient(0,0,W,H);
        llGrad.addColorStop(0,`rgba(255,200,100,${llAlpha})`);
        llGrad.addColorStop(1,'transparent');
        ctx.fillStyle=llGrad; ctx.fillRect(0,0,W,H);
      }

      effectRAF = requestAnimationFrame(loop);
    }
    effectRAF = requestAnimationFrame(loop);

    frame._onMouse = onMouse;
    frame._onTouch = onTouch;
  }

  function stopEffect() {
    if(effectRAF) { cancelAnimationFrame(effectRAF); effectRAF = null; }
    if(activeEffect) {
      activeEffect = null;
      document.querySelectorAll('.btn-effect').forEach(b => b.classList.remove('active'));
      if(frame._onMouse) frame.removeEventListener('mousemove', frame._onMouse);
      if(frame._onTouch) frame.removeEventListener('touchmove', frame._onTouch);
      stopAudio();
    }
    if(uploadedImage) {
      effectCanvas.classList.add('hidden');
      if(!previewVideo.src || previewVideo.classList.contains('hidden')) {
        previewImg.classList.remove('hidden');
      }
    }
  }

  // ===== GALLERY =====
  galleryHeader.addEventListener('click', () => {
    galleryGrid.classList.toggle('hidden');
    galleryHeader.classList.toggle('open');
  });

  function renderGallery() {
    galleryGrid.innerHTML = '';
    galleryHeader.querySelector('h3').textContent = `\u{1F3AC} Galeria (${gallery.length})`;
    gallery.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.innerHTML = `<img src="${item.thumb}" alt="Animation ${idx+1}"><button class="delete-btn" data-idx="${idx}">\u2716</button>`;
      galleryGrid.appendChild(div);
    });
    galleryGrid.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        gallery.splice(idx, 1);
        try { localStorage.setItem('isla_gallery', JSON.stringify(gallery)); } catch(e){}
        renderGallery();
        toast('Removido da galeria');
      });
    });
  }
  renderGallery();

})();
</script>
</body>
</html>
