<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islanda Animada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 50%,#1a0a2e 100%);min-height:100vh;color:#e8d5f5;overflow-x:hidden}
header{text-align:center;padding:30px 20px 10px}
header h1{font-size:2.5em;background:linear-gradient(45deg,#f5a6e6,#a855f7,#f5a6e6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
header p{font-style:italic;color:#c4a6d9;margin-top:5px;font-size:1.1em}
.counter{text-align:center;margin:5px 0;font-size:0.9em;color:#a78bba}
.easel{display:flex;justify-content:center;padding:20px;perspective:1000px}
.canvas-frame{position:relative;width:520px;height:520px;background:#2a1a3a;border:12px solid #4a2c6a;border-radius:8px;box-shadow:0 0 40px rgba(168,85,247,0.3),inset 0 0 30px rgba(0,0,0,0.5);overflow:hidden}
.canvas-frame::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:60px;height:20px;background:#4a2c6a;border-radius:4px 4px 0 0;z-index:2}
.upload-zone{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:3px dashed #7c3aed;border-radius:4px;transition:all 0.3s}
.upload-zone:hover{border-color:#a855f7;background:rgba(168,85,247,0.1)}
.upload-zone.dragover{border-color:#f5a6e6;background:rgba(245,166,230,0.1)}
.upload-zone .icon{font-size:4em;margin-bottom:10px}
.upload-zone p{font-size:1.1em;color:#c4a6d9}
.upload-zone small{color:#8b6aad;margin-top:8px}
#previewContainer{display:none;width:100%;height:100%;position:relative}
#previewImg{width:100%;height:100%;object-fit:contain;display:block}
#effectCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#videoPreview{width:100%;height:100%;object-fit:contain;display:none;position:absolute;top:0;left:0}
.controls{text-align:center;padding:20px}
.btn-group{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.btn{padding:14px 28px;border:none;border-radius:30px;font-size:1.1em;font-family:inherit;cursor:pointer;transition:all 0.3s;font-weight:bold}
.btn-vida{background:linear-gradient(45deg,#7c3aed,#a855f7);color:#fff;box-shadow:0 4px 15px rgba(168,85,247,0.4)}
.btn-vida:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(168,85,247,0.6)}
.btn-vida:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-efeitos{background:linear-gradient(45deg,#6d28d9,#9333ea);color:#fff;box-shadow:0 4px 15px rgba(147,51,234,0.4)}
.btn-efeitos:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(147,51,234,0.6)}
.effects-panel{display:none;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:15px;padding:10px;animation:fadeIn 0.3s}
.effects-panel.visible{display:flex}
.btn-effect{padding:10px 20px;border:2px solid #7c3aed;border-radius:20px;background:transparent;color:#e8d5f5;font-family:inherit;cursor:pointer;transition:all 0.3s}
.btn-effect:hover,.btn-effect.active{background:#7c3aed;color:#fff;transform:scale(1.05)}
.status{text-align:center;padding:10px;color:#c4a6d9;font-style:italic;min-height:30px}
.gallery{padding:20px 40px}
.gallery h2{text-align:center;margin-bottom:15px;color:#c4a6d9;font-size:1.3em}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px}
.gallery-item{position:relative;border-radius:8px;overflow:hidden;border:3px solid #4a2c6a;aspect-ratio:1;background:#1a0a2e}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover}
.gallery-item .delete-btn{position:absolute;top:5px;right:5px;width:28px;height:28px;border-radius:50%;background:rgba(220,38,38,0.8);color:#fff;border:none;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s}
.gallery-item:hover .delete-btn{opacity:1}
footer{text-align:center;padding:30px;color:#8b6aad;font-size:1em}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.loading-spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#fileInput{display:none}
</style>
</head>
<body>
<header>
<h1>Islanda Animada</h1>
<p>Dando vida as suas pinturas</p>
</header>
<div class="counter" id="counter"></div>
<div class="easel">
<div class="canvas-frame" id="canvasFrame">
<div class="upload-zone" id="uploadZone">
<div class="icon">🎨</div>
<p>Arraste sua pintura aqui</p>
<small>ou clique para selecionar</small>
</div>
<div id="previewContainer">
<img id="previewImg" alt="Preview">
<canvas id="effectCanvas"></canvas>
<video id="videoPreview" loop muted></video>
</div>
<input type="file" id="fileInput" accept="image/*">
</div>
</div>
<div class="controls">
<div class="btn-group">
<button class="btn btn-vida" id="btnVida" disabled>🌟 Dar Vida</button>
<button class="btn btn-efeitos" id="btnEfeitos" disabled>🎭 Efeitos</button>
</div>
<div class="effects-panel" id="effectsPanel">
<button class="btn-effect" data-effect="parallax">🔮 Parallax 2.5D</button>
<button class="btn-effect" data-effect="ondas">🌊 Ondas</button>
<button class="btn-effect" data-effect="flutuante">🎈 Flutuante</button>
<button class="btn-effect" data-effect="cinematic">🎬 Cinematic</button>
</div>
</div>
<div class="status" id="status"></div>
<div class="gallery">
<h2>Galeria</h2>
<div class="gallery-grid" id="galleryGrid"></div>
</div>
<footer>Feito com 💜 para Islanda</footer>
<script>
(function(){
'use strict';
document.addEventListener('DOMContentLoaded', function(){

const API_KEY = 'sk-qUAe4fe572yDOKXx4Ir0SHdoZUrnhF0ebaEBUmJzNXCFDXK0';
const API_URL = 'https://api.stability.ai/v2beta/image-to-video';

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const previewImg = document.getElementById('previewImg');
const effectCanvas = document.getElementById('effectCanvas');
const videoPreview = document.getElementById('videoPreview');
const btnVida = document.getElementById('btnVida');
const btnEfeitos = document.getElementById('btnEfeitos');
const effectsPanel = document.getElementById('effectsPanel');
const statusEl = document.getElementById('status');
const galleryGrid = document.getElementById('galleryGrid');
const counterEl = document.getElementById('counter');
const canvasFrame = document.getElementById('canvasFrame');

let currentFile = null;
let currentEffect = null;
let animFrameId = null;
let audioCtx = null;
let particles = [];
let usageCount = parseInt(localStorage.getItem('islanda_usage') || '0');
let gallery = JSON.parse(localStorage.getItem('islanda_gallery') || '[]');

function updateCounter(){
  counterEl.textContent = '🌟 Dar Vida usado: ' + usageCount + ' vez' + (usageCount !== 1 ? 'es' : '');
}
updateCounter();

function setStatus(msg){statusEl.innerHTML = msg;}

// --- Upload ---
uploadZone.addEventListener('click', function(e){
  e.stopPropagation();
  fileInput.click();
});

fileInput.addEventListener('click', function(e){
  e.stopPropagation();
});

fileInput.addEventListener('change', function(e){
  e.stopPropagation();
  if(fileInput.files && fileInput.files[0]){
    handleFile(fileInput.files[0]);
  }
});

uploadZone.addEventListener('dragover', function(e){
  e.preventDefault();
  e.stopPropagation();
  uploadZone.classList.add('dragover');
});

uploadZone.addEventListener('dragleave', function(e){
  e.preventDefault();
  e.stopPropagation();
  uploadZone.classList.remove('dragover');
});

uploadZone.addEventListener('drop', function(e){
  e.preventDefault();
  e.stopPropagation();
  uploadZone.classList.remove('dragover');
  if(e.dataTransfer.files && e.dataTransfer.files[0]){
    handleFile(e.dataTransfer.files[0]);
  }
});

function handleFile(file){
  if(!file.type.startsWith('image/')) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = function(ev){
    previewImg.src = ev.target.result;
    uploadZone.style.display = 'none';
    previewContainer.style.display = 'block';
    videoPreview.style.display = 'none';
    btnVida.disabled = false;
    btnEfeitos.disabled = false;
    stopEffect();
    setStatus('Imagem carregada! Escolha uma opcao.');
  };
  reader.readAsDataURL(file);
}

// --- Resize to 768x768 ---
function resizeTo768(file){
  return new Promise(function(resolve){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas');
      c.width = 768; c.height = 768;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 768, 768);
      c.toBlob(function(blob){resolve(blob);}, 'image/png');
    };
    img.src = URL.createObjectURL(file);
  });
}

// --- Dar Vida (API) ---
btnVida.addEventListener('click', async function(){
  if(!currentFile) return;
  btnVida.disabled = true;
  setStatus('<span class="loading-spinner"></span> Gerando animacao... pode levar ate 2 minutos.');

  try{
    var resized = await resizeTo768(currentFile);
    var formData = new FormData();
    formData.append('image', resized, 'image.png');
    formData.append('seed', '0');
    formData.append('cfg_scale', '2.5');
    formData.append('motion_bucket_id', '127');

    var resp = await fetch(API_URL, {
      method: 'POST',
      headers: {'authorization': 'Bearer ' + API_KEY},
      body: formData
    });

    if(!resp.ok){
      var err = await resp.text();
      throw new Error('API error: ' + resp.status + ' ' + err);
    }

    var data = await resp.json();
    var genId = data.id;
    setStatus('<span class="loading-spinner"></span> Processando video (ID: ' + genId + ')...');

    // Poll for result
    var videoBlob = await pollResult(genId);
    var videoUrl = URL.createObjectURL(videoBlob);
    videoPreview.src = videoUrl;
    videoPreview.style.display = 'block';
    videoPreview.play();
    stopEffect();

    usageCount++;
    localStorage.setItem('islanda_usage', usageCount.toString());
    updateCounter();

    addToGallery(videoUrl, 'video');
    setStatus('✨ Animacao criada com sucesso!');
  } catch(e){
    setStatus('❌ Erro: ' + e.message);
  }
  btnVida.disabled = false;
});

async function pollResult(id){
  var url = API_URL + '/result/' + id;
  while(true){
    await new Promise(function(r){setTimeout(r, 3000);});
    var resp = await fetch(url, {
      headers: {
        'authorization': 'Bearer ' + API_KEY,
        'accept': 'video/*'
      }
    });
    if(resp.status === 202){
      continue;
    }
    if(resp.ok){
      return await resp.blob();
    }
    var errText = await resp.text();
    throw new Error('Poll error: ' + resp.status + ' ' + errText);
  }
}

// --- Effects ---
btnEfeitos.addEventListener('click', function(){
  effectsPanel.classList.toggle('visible');
});

var effectBtns = document.querySelectorAll('.btn-effect');
effectBtns.forEach(function(btn){
  btn.addEventListener('click', function(){
    effectBtns.forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    startEffect(btn.getAttribute('data-effect'));
  });
});

function stopEffect(){
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  currentEffect = null;
  effectCanvas.style.display = 'none';
  previewImg.style.transform = '';
  previewImg.style.transition = '';
  particles = [];
}

function startEffect(type){
  stopEffect();
  currentEffect = type;
  videoPreview.style.display = 'none';
  effectCanvas.style.display = 'block';
  var rect = previewContainer.getBoundingClientRect();
  effectCanvas.width = rect.width;
  effectCanvas.height = rect.height;
  var ctx = effectCanvas.getContext('2d');
  particles = createParticles(20);
  initAmbientSound(type);

  if(type === 'parallax') runParallax(ctx);
  else if(type === 'ondas') runOndas(ctx);
  else if(type === 'flutuante') runFlutuante(ctx);
  else if(type === 'cinematic') runCinematic(ctx);
}

// --- Particles ---
function createParticles(n){
  var arr = [];
  for(var i=0;i<n;i++){
    arr.push({
      x: Math.random()*effectCanvas.width,
      y: Math.random()*effectCanvas.height,
      size: Math.random()*4+1,
      speedX: (Math.random()-0.5)*0.5,
      speedY: -Math.random()*0.8-0.2,
      opacity: Math.random()*0.7+0.3,
      hue: Math.random()*60+270
    });
  }
  return arr;
}

function drawParticles(ctx){
  particles.forEach(function(p){
    p.x += p.speedX;
    p.y += p.speedY;
    if(p.y < -10){p.y = effectCanvas.height + 10; p.x = Math.random()*effectCanvas.width;}
    if(p.x < -10) p.x = effectCanvas.width + 10;
    if(p.x > effectCanvas.width + 10) p.x = -10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = 'hsla('+p.hue+',80%,70%,'+p.opacity+')';
    ctx.fill();
  });
}

// --- Parallax 2.5D ---
var mouseX = 0.5, mouseY = 0.5;
canvasFrame.addEventListener('mousemove', function(e){
  var rect = canvasFrame.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / rect.width;
  mouseY = (e.clientY - rect.top) / rect.height;
});

function runParallax(ctx){
  var img = new Image();
  img.src = previewImg.src;
  img.onload = function(){
    var layers = [
      {depth:0.02, scale:1.05},
      {depth:0.04, scale:1.1},
      {depth:0.06, scale:1.15}
    ];
    function animate(){
      ctx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
      var cw = effectCanvas.width, ch = effectCanvas.height;
      layers.forEach(function(layer){
        var offX = (mouseX - 0.5) * cw * layer.depth;
        var offY = (mouseY - 0.5) * ch * layer.depth;
        var s = layer.scale;
        var dw = cw * s, dh = ch * s;
        var dx = (cw - dw)/2 + offX;
        var dy = (ch - dh)/2 + offY;
        ctx.globalAlpha = 0.35;
        ctx.drawImage(img, dx, dy, dw, dh);
      });
      ctx.globalAlpha = 1;
      drawParticles(ctx);
      animFrameId = requestAnimationFrame(animate);
    }
    animate();
  };
}

// --- Ondas ---
function runOndas(ctx){
  var img = new Image();
  img.src = previewImg.src;
  img.onload = function(){
    var t = 0;
    function animate(){
      ctx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
      var cw = effectCanvas.width, ch = effectCanvas.height;
      var sliceH = 4;
      for(var y=0; y<ch; y+=sliceH){
        var offset = Math.sin((y*0.02) + t*0.03) * 8;
        ctx.drawImage(img, 0, y*(img.naturalHeight/ch), img.naturalWidth, sliceH*(img.naturalHeight/ch),
          offset, y, cw, sliceH);
      }
      drawParticles(ctx);
      t++;
      animFrameId = requestAnimationFrame(animate);
    }
    animate();
  };
}

// --- Flutuante ---
function runFlutuante(ctx){
  var t = 0;
  function animate(){
    ctx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
    var scale = 1 + Math.sin(t*0.015)*0.03;
    var rot = Math.sin(t*0.01)*1.5;
    previewImg.style.transform = 'scale('+scale+') rotate('+rot+'deg)';
    previewImg.style.transition = 'transform 0.1s ease';
    drawParticles(ctx);
    t++;
    animFrameId = requestAnimationFrame(animate);
  }
  animate();
}

// --- Cinematic (Ken Burns) ---
function runCinematic(ctx){
  var img = new Image();
  img.src = previewImg.src;
  img.onload = function(){
    var t = 0;
    var duration = 600;
    function animate(){
      ctx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
      var cw = effectCanvas.width, ch = effectCanvas.height;
      var progress = (t % duration) / duration;
      var scale = 1.0 + progress * 0.15;
      var panX = progress * 20 - 10;
      var panY = progress * 10 - 5;
      var dw = cw * scale, dh = ch * scale;
      var dx = (cw - dw)/2 + panX;
      var dy = (ch - dh)/2 + panY;
      ctx.drawImage(img, dx, dy, dw, dh);
      drawParticles(ctx);
      t++;
      animFrameId = requestAnimationFrame(animate);
    }
    animate();
  };
}

// --- Ambient Sound (Web Audio API) ---
function initAmbientSound(type){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  gain.gain.value = 0.03;
  osc.type = 'sine';
  if(type === 'parallax') osc.frequency.value = 120;
  else if(type === 'ondas') osc.frequency.value = 80;
  else if(type === 'flutuante') osc.frequency.value = 150;
  else if(type === 'cinematic') osc.frequency.value = 100;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  // Fade out after 3 seconds
  gain.gain.setTargetAtTime(0, audioCtx.currentTime + 2, 0.5);
  setTimeout(function(){osc.stop();}, 4000);
}

// --- Gallery ---
function renderGallery(){
  galleryGrid.innerHTML = '';
  gallery.forEach(function(item, idx){
    var div = document.createElement('div');
    div.className = 'gallery-item';
    if(item.type === 'video'){
      var vid = document.createElement('video');
      vid.src = item.src;
      vid.loop = true; vid.muted = true; vid.autoplay = true;
      div.appendChild(vid);
    } else {
      var im = document.createElement('img');
      im.src = item.src;
      div.appendChild(im);
    }
    var delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = 'X';
    delBtn.addEventListener('click', function(){
      gallery.splice(idx, 1);
      localStorage.setItem('islanda_gallery', JSON.stringify(gallery));
      renderGallery();
    });
    div.appendChild(delBtn);
    galleryGrid.appendChild(div);
  });
}

function addToGallery(src, type){
  gallery.push({src: src, type: type});
  // Only store data URLs in localStorage (blobs won't persist)
  try{localStorage.setItem('islanda_gallery', JSON.stringify(gallery));}catch(e){}
  renderGallery();
}

renderGallery();

});
})();
</script>
</body>
</html>
